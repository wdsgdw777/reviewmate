<!-- Template: New/Edit Question Form -->
<div class="modal-header">
    <h2>{{ '编辑题目' if q.id else '添加题目' }}</h2>
    <button class="modal-close" onclick="closeModal()">&times;</button>
</div>
<form hx-post="/api/library/question" hx-target="#modal-form-result" hx-swap="innerHTML">
    <input type="hidden" name="qid" value="{{ q.id }}">
    <div class="form-row">
        <div class="form-group">
            <label class="form-label">分类</label>
            <select name="category" class="form-select" required>
                <option value="">选择分类</option>
                <option value="C" {{ 'selected' if q.category == 'C' else '' }}>C</option>
                <option value="Python" {{ 'selected' if q.category == 'Python' else '' }}>Python</option>
                <option value="SQL" {{ 'selected' if q.category == 'SQL' else '' }}>SQL</option>
                <option value="数据结构" {{ 'selected' if q.category == '数据结构' else '' }}>数据结构</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">题型</label>
            <select name="qtype" class="form-select" required onchange="toggleQuestionFields(this.value)">
                <option value="choice" {{ 'selected' if q.type == 'choice' else '' }}>选择题</option>
                <option value="open" {{ 'selected' if q.type == 'open' else '' }}>简答题</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">难度</label>
            <select name="difficulty" class="form-select">
                <option value="easy" {{ 'selected' if q.difficulty == 'easy' else '' }}>简单</option>
                <option value="medium" {{ 'selected' if q.difficulty == 'medium' else '' }}>中等</option>
                <option value="hard" {{ 'selected' if q.difficulty == 'hard' else '' }}>困难</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="form-label">标签（逗号分隔）</label>
        <input type="text" name="tags" class="form-input" value="{{ ', '.join(q.tags) if q.tags else '' }}">
    </div>
    <div class="form-group">
        <label class="form-label">题目内容</label>
        <textarea name="content" class="form-textarea" rows="4" required>{{ q.content }}</textarea>
    </div>
    <div class="form-group" id="options-group" style="{{ 'display:none;' if q.type != 'choice' else '' }}">
        <label class="form-label">选项（每行一个）</label>
        <textarea name="options" class="form-textarea" rows="4">{{ '
'.join(q.options) if q.options else '' }}</textarea>
    </div>
    <div class="form-group">
        <label class="form-label">正确答案</label>
        <input type="text" name="answer" class="form-input" value="{{ q.answer }}" required>
    </div>
    <div class="form-row">
        <div class="form-group" id="match-mode-group">
            <label class="form-label">核对模式</label>
            <select name="answer_match_mode" class="form-select">
                <option value="exact" {{ 'selected' if q.answer_match_mode == 'exact' else '' }}>精确匹配</option>
                <option value="normalized" {{ 'selected' if q.answer_match_mode == 'normalized' else '' }}>标准化匹配</option>
                <option value="keywords" {{ 'selected' if q.answer_match_mode == 'keywords' else '' }}>关键词匹配</option>
            </select>
        </div>
        <div class="form-group" id="keywords-group" style="{{ 'display:none;' if q.answer_match_mode != 'keywords' else '' }}">
            <label class="form-label">关键词（逗号分隔）</label>
            <input type="text" name="keywords" class="form-input" value="{{ ', '.join(q.keywords) if q.keywords else '' }}">
        </div>
    </div>
    <div class="form-group">
        <label class="form-label">解析</label>
        <textarea name="explanation" class="form-textarea" rows="3">{{ q.explanation or '' }}</textarea>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">保存</button>
        <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
    </div>
    <div id="modal-form-result"></div>
</form>
<script>
function toggleQuestionFields(qtype) {
    document.getElementById('options-group').style.display = qtype === 'choice' ? '' : 'none';
}
</script>
